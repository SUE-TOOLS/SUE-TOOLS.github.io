<!DOCTYPE html>
<html>
<head>
    <title>Shop - SUE Tools</title>
    <link rel="stylesheet" href="style.css">
    <script>
        function addToCart(name, price) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.push({name: name, price: price});
            localStorage.setItem("cart", JSON.stringify(cart));
            alert("Added to cart!");
        }
    </script>
</head>
<body>

<h1>New Tools</h1>

<nav>
    <a href="index.html">Home</a> |
    <a href="shop.html">Shop</a> |
    <a href="used.html">Used Tools</a> |
    <a href="cart.html">Cart</a>
</nav>

<br><br>

<div class="products">

    <div class="product">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/T-square.jpg" width="200">
        <h3>T Ruler</h3>
        <p>350 EGP</p>
        <button onclick="addToCart('T Ruler',350)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Set_square_45_degree.jpg" width="200">
        <h3>45° Triangle</h3>
        <p>120 EGP</p>
        <button onclick="addToCart('45 Triangle',120)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/0a/Set_square_30_60_degree.jpg" width="200">
        <h3>30°-60° Triangle</h3>
        <p>120 EGP</p>
        <button onclick="addToCart('30-60 Triangle',120)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4d/Rotring_technical_pen.jpg" width="200">
        <h3>Rotring Pens (All Sizes)</h3>
        <p>450 EGP</p>
        <button onclick="addToCart('Rotring Pens',450)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/23/Eraser.jpg" width="200">
        <h3>Eraser</h3>
        <p>20 EGP</p>
        <button onclick="addToCart('Eraser',20)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Ruler.jpg" width="200">
        <h3>Normal Ruler</h3>
        <p>25 EGP</p>
        <button onclick="addToCart('Normal Ruler',25)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Protractor.jpg" width="200">
        <h3>Protractor</h3>
        <p>30 EGP</p>
        <button onclick="addToCart('Protractor',30)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Compass_drawing.jpg" width="200">
        <h3>Compass</h3>
        <p>60 EGP</p>
        <button onclick="addToCart('Compass',60)">Add to Cart</button>
    </div>

</div>

<br><br>

<a href="cart.html">Go To Cart</a>

</body>
</html>
