<!DOCTYPE html>
<html>
<head>
    <title>Shop - SUE Tools</title>
    <link rel="stylesheet" href="style.css">
    <script>
        function addToCart(name, price) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.push({name: name, price: price});
            localStorage.setItem("cart", JSON.stringify(cart));
            alert("Added to cart!");
        }
    </script>
</head>
<body>

<h1>New Tools</h1>

<nav>
    <a href="index.html">Home</a> |
    <a href="shop.html">Shop</a> |
    <a href="used.html">Used Tools</a> |
    <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
</nav>

<br><br>

<div class="products">

    <div class="product">
        <h3>T Ruler</h3>
        <p>100 EGP</p>
        <button onclick="addToCart('T Ruler',100)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>45° Triangle</h3>
        <p>30 EGP</p>
        <button onclick="addToCart('45 Triangle',30)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>30°-60° Triangle</h3>
        <p>30 EGP</p>
        <button onclick="addToCart('30-60 Triangle',30)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Rotring Pens (All Sizes)</h3>
        <p>20 EGP</p>
        <button onclick="addToCart('Rotring Pens',20)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Eraser</h3>
        <p>5 EGP</p>
        <button onclick="addToCart('Eraser',5)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Normal Ruler</h3>
        <p>5 EGP</p>
        <button onclick="addToCart('Normal Ruler',5)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Protractor</h3>
        <p>15 EGP</p>
        <button onclick="addToCart('Protractor',15)">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Compass</h3>
        <p>15 EGP</p>
        <button onclick="addToCart('Compass',15)">Add to Cart</button>
    </div>

</div>

<br><br>

<a href="cart.html">Go To Cart</a>
<script>
function updateCartCount(){
let cart = JSON.parse(localStorage.getItem("cart")) || [];
document.getElementById("cart-count").innerText = cart.length;
}

updateCartCount();
</script>
</body>
</html>
